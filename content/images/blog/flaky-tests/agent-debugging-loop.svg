  <title
     id="title">Supervised AI debugging loop</title>
  <desc
     id="desc">A diagram showing flaky CI logs flowing into an agent-generated report, human review, prioritized fixes, local stress tests, GitHub Actions reruns, and report updates that repeat until failures go down.</desc>
