  <title
     id="title">SpatiaLite lookup and SQLite cleanup race</title>
  <desc
     id="desc">A diagram showing one thread opening a SpatiaLite connection and forking ldconfig through find_library while another thread closes a SQLite connection, causing heap corruption. The fix memoizes the library lookup and serializes connection open and close.</desc>
