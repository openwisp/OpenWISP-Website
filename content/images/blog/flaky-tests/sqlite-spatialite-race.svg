         stop-color="#061526"
         id="stop1" />
      <stop
         offset="0.55"
         stop-color="#09283d"
         id="stop2" />
      <stop
         offset="1"
         stop-color="#0a1f2f"
         id="stop3" />
    </linearGradient>
    <linearGradient
       id="threadA"
       x1="0"
       y1="0"
       x2="1"
       y2="0">
      <stop
